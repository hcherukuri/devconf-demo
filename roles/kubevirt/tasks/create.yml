---
- name: Create a namespace
  kubernetes.core.k8s:
    name: "{{ namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create a VirtualMachine
  redhat.openshift_virtualization.kubevirt_vm:
    state: present
    name: "{{ item.name }}"
    namespace: "{{ namespace }}"
    labels:
      app: demo
    instancetype:
      name: u1.medium
    preference:
      name: rhel.8
    data_volume_templates:
      - metadata:
          name: "{{ item.name }}-volume"
        spec:
          sourceRef:
            kind: DataSource
            name: rhel8
            namespace: openshift-virtualization-os-images
          storage:
            resources:
              requests: {}
    spec:
      domain:
        devices: {}
      volumes:
        - dataVolume:
            name: "{{ item.name }}-volume"
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              chpasswd:
                expire: false
              password: 123qwe
              user: root
              ssh_authorized_keys:
                - ssh-rsa  Generated-by-Nova
          name: cloudinit
    wait: true
  loop: "{{ vm }}"